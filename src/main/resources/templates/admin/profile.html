<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ Admin — Lily</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/base.css}" href="/css/common/base.css">
    <link rel="stylesheet" th:href="@{/css/common/themes.css}" href="/css/common/themes.css">
    <link rel="stylesheet" th:href="@{/css/projects/projects.css}" href="/css/projects/projects.css">
    <link rel="stylesheet" th:href="@{/css/profile/profile.css}" href="/css/profile/profile.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}" href="/css/admin/admin.css">
    <script th:src="@{/js/auth/auth.js}" src="/js/auth/auth.js"></script>
</head>
<body data-theme="dark">
    <div class="dashboard-container">
        <aside class="dashboard-sidebar">
            <div class="brand-section">
                <span class="brand-logo"></span>
                <h2>Lily Admin</h2>
            </div>

            <nav class="sidebar-nav">
                <a class="nav-item" href="/admin">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Trang quản trị
                </a>
                <a class="nav-item active" href="/admin/profile">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Hồ sơ cá nhân
                </a>
            </nav>

            <div class="user-profile">
                <div class="user-avatar" id="user-initials">A</div>
                <div class="user-info">
                    <span class="user-name" id="username-display">Admin</span>
                    <span class="user-role">Quản trị viên</span>
                </div>
                <div class="logout-form">
                    <button type="button" class="btn-logout" onclick="AuthUtil.logout()" title="Đăng xuất">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                </div>
            </div>
        </aside>

        <main class="dashboard-content">
            <section class="profile-page" style="max-width: 1000px;">
                <h1>Hồ sơ Quản trị viên</h1>
                
                <div id="profile-status"></div>

                <div class="profile-layout" style="display: block;">
                    <div class="profile-card">
                        <div class="profile-card-header">
                            <h3>Thông tin cơ bản</h3>
                            <p class="profile-card-desc">Quản lý tên hiển thị và email (không hỗ trợ thay đổi email cho Admin tại đây).</p>
                        </div>
                        <form id="profile-form">
                            <div class="form-group">
                                <label for="username">Tên hiển thị</label>
                                <input type="text" id="username" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Địa chỉ Email</label>
                                <input type="email" id="email" class="form-control" disabled>
                            </div>
                            <button type="submit" class="btn btn-primary" id="btn-save-profile">Lưu thay đổi</button>
                        </form>
                    </div>

                    <div class="profile-card" style="margin-top: 24px;">
                        <div class="profile-card-header">
                            <h3>Đổi mật khẩu</h3>
                            <p class="profile-card-desc">Cập nhật mật khẩu quản trị để đảm bảo an toàn.</p>
                        </div>
                        <form id="password-form">
                            <div class="form-group">
                                <label for="currentPassword">Mật khẩu hiện tại</label>
                                <input type="password" id="currentPassword" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="newPassword">Mật khẩu mới</label>
                                <input type="password" id="newPassword" class="form-control" required minlength="6">
                            </div>
                            <button type="submit" class="btn btn-secondary" id="btn-change-password">Đổi mật khẩu</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script th:src="@{/js/admin/profile.js}" src="/js/admin/profile.js"></script>
</body>
</html>
