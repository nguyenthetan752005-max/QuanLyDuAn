<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Lily</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/base.css}">
    <link rel="stylesheet" th:href="@{/css/common/themes.css}">
    <link rel="stylesheet" th:href="@{/css/auth/auth.css}">
</head>
<body data-theme="dark">
    <div class="auth-glow auth-glow-1" aria-hidden="true"></div>
    <div class="auth-glow auth-glow-2" aria-hidden="true"></div>
    <div class="auth-container">
        <div class="auth-panel">
            <a class="auth-brand" th:href="@{/}" href="/">
                <span class="auth-brand-icon" aria-hidden="true"></span>
                <span class="auth-brand-name">Lily Admin</span>
            </a>
            <form class="auth-form" id="admin-login-form">
                <h2>Trang Đăng Nhập Quản Trị</h2>
                <p class="auth-description">Đăng nhập bằng tài khoản Admin để quản lý hệ thống.</p>
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập Admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Đăng nhập Quản Trị</button>

                <p class="auth-links" style="margin-top: 20px;"><a th:href="@{/login}">← Quay lại đăng nhập người dùng</a></p>
            </form>
        </div>
    </div>
    <script th:src="@{/js/auth/auth.js}"></script>
    <script th:src="@{/js/admin/login.js}"></script>
</body>
</html>
