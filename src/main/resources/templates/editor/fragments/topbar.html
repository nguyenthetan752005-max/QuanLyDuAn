<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="app-chrome" th:fragment="topbar">
    <div class="menubar">
        <div class="menubar-left">
            <a class="brand-mark" href="/projects" title="Lily — Về trang quản lý">
                <span class="brand-mark-icon" aria-hidden="true"></span>
                <span class="brand-mark-name">Lily</span>
            </a>
            <div class="menu-group">
                <button class="toolbar-button" type="button" data-menu-toggle="file-menu" data-i18n="MENU_FILE"></button>
                <div class="menu-panel" id="file-menu" hidden>
                    <button class="menu-item" type="button" id="import-folder-action" data-i18n="MENU_IMPORT_FOLDER"></button>
                    <button class="menu-item" type="button" id="import-file-action" data-i18n="MENU_IMPORT_FILE"></button>
                    <div class="menu-separator"></div>
                    <button class="menu-item" type="button" id="save-as-action" data-i18n="MENU_SAVE_AS" disabled></button>
                    <button class="menu-item" type="button" id="save-project-action">Lưu dự án (Cloud)</button>
                    <button class="menu-item" type="button" id="version-history-action">Lịch sử phiên bản</button>
                    <button class="menu-item" type="button" id="shortcuts-action">Phím tắt (?)</button>
                    <button class="menu-item" type="button" id="export-canvas-action">Xuất ảnh / Export</button>
                    <div class="menu-separator"></div>
                    <button class="menu-item" type="button" id="clear-workspace-action" data-i18n="MENU_CLEAR_WORKSPACE"></button>
                    <div class="menu-separator"></div>
                    <a class="menu-item" href="/projects">Về trang quản lý</a>
                </div>
            </div>
            <button class="quick-action-btn primary-action-btn toolbar-btn-spaced" type="button" id="toggle-sidebar" title="Hiện/Ẩn Menu Tệp tin">Explorer</button>
            <div class="project-name-wrapper">
                <div class="project-name-display" id="project-name-display" title="Nhấp để đổi tên dự án">Dự án chưa đặt tên</div>
                <button type="button" id="btn-rename-project-topbar" title="Đổi tên dự án">
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                </button>
            </div>
        </div>

        <div class="menubar-right">
            <!-- Cloud Save Status Badge -->
            <div class="cloud-status-badge" id="cloud-status-badge">
                <svg class="cloud-icon" viewBox="0 0 24 24" width="14" height="14">
                    <path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3z"/>
                </svg>
                <span id="cloud-status-text">Đang tải...</span>
            </div>

            <!-- Quick Action Buttons -->
            <button class="quick-action-btn primary-action-btn" type="button" id="undo-btn" title="Undo (Ctrl+Z)">
                <svg class="icon-left" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 14 4 9 9 4"></polyline>
                    <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
                </svg>
                Hoàn tác
            </button>
            <button class="quick-action-btn primary-action-btn" type="button" id="redo-btn" title="Redo (Ctrl+Y / Ctrl+Shift+Z)">
                <svg class="icon-left" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 14 20 9 15 4"></polyline>
                    <path d="M4 20v-7a4 4 0 0 1 4-4h12"></path>
                </svg>
                Làm lại
            </button>
            <button class="quick-action-btn primary-action-btn" type="button" id="quick-save-btn">Lưu dự án</button>
            <button class="quick-action-btn accent-action-btn" type="button" id="quick-export-btn">Xuất ảnh</button>

            <!-- Preview Quality -->
            <div class="menu-group">
                <button class="toolbar-button" type="button" data-menu-toggle="preview-quality-menu" id="preview-quality-btn" title="Chất lượng xem trước">
                    1080p
                </button>
                <div class="menu-panel right-aligned" id="preview-quality-menu" hidden>
                    <button class="menu-item is-active" type="button" data-quality="1080p">Cao (1080p)</button>
                    <button class="menu-item" type="button" data-quality="720p">Trung bình (720p)</button>
                    <button class="menu-item" type="button" data-quality="360p">Thấp (360p - mượt)</button>
                </div>
            </div>

            <!-- Theme Trigger -->
            <div class="menu-group theme-entry">
                <button class="toolbar-button theme-button" type="button" data-menu-toggle="theme-menu" data-i18n-aria-label="THEME_LABEL">
                    <span class="preview-thumb" aria-hidden="true"></span>
                </button>
                <div class="menu-panel right-aligned" id="theme-menu" hidden>
                    <button class="menu-item is-active" type="button" data-theme-option="dark" data-i18n="THEME_DARK"></button>
                    <button class="menu-item" type="button" data-theme-option="light" data-i18n="THEME_LIGHT"></button>
                    <button class="menu-item" type="button" data-theme-option="warm" data-i18n="THEME_WARM"></button>
                    <button class="menu-item" type="button" data-theme-option="cold" data-i18n="THEME_COLD"></button>
                </div>
            </div>

            <!-- Tool Panel Toggle Button -->
            <button class="quick-action-btn primary-action-btn toolbar-btn-spaced" type="button" id="toggle-right-panel" title="Hiện/Ẩn Bảng Chỉnh Sửa">Tool</button>
        </div>
    </div>
    <!-- Hidden legacy status target to ensure no scripts throw null-pointer errors -->
    <div class="toolbar-status d-none" id="toolbar-status" data-i18n="STATUS_READY"></div>
</header>
</body>
</html>
