<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar panel" th:fragment="sidebar">
    <!-- Explorer Panel Content -->
    <div id="explorer-tab-content" class="explorer-tab-content" style="display: flex; flex-direction: column; height: 100%;">
        <!-- Panel Header -->
        <div class="panel-header explorer-panel-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.08));">
            <span class="panel-kicker">Kho lưu trữ</span>
        </div>

        <!-- Search box -->
        <div class="sidebar-search-box" style="padding: 8px 12px;">
            <div style="position: relative; display: flex; align-items: center; width: 100%;">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 8px; color: var(--text-muted);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="explorer-search" placeholder="Tìm tệp tin..." style="width: 100%; padding: 6px 8px 6px 28px; border-radius: 6px; border: 1px solid var(--border-strong); background: var(--bg); color: var(--text); font-size: 12px;">
            </div>
        </div>

        <!-- Media / Trash Tabs -->
        <div class="explorer-tabs-container" style="padding: 0 12px 8px; display: flex; gap: 4px; border-bottom: 1px solid rgba(255,255,255,0.05);">
            <button class="exp-tab-btn active" id="btn-exp-media-sidebar" type="button" style="flex: 1; padding: 6px; font-size: 11px; border-radius: 4px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 500; text-align: center;">Tệp tin</button>
            <button class="exp-tab-btn" id="btn-exp-trash-sidebar" type="button" style="flex: 1; padding: 6px; font-size: 11px; border-radius: 4px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 500; text-align: center;">Thùng rác</button>
        </div>

        <!-- Explorer Quick Actions -->
        <div class="explorer-quick-actions" id="explorer-quick-actions">
            <button id="btn-create-folder-sidebar" type="button">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                Tạo thư mục
            </button>
            <button id="btn-upload-file-sidebar" type="button">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Tải lên tệp
            </button>
            <button id="btn-import-social-sidebar" type="button">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                MXH
            </button>
        </div>
        
        <!-- Hidden inputs for upload -->
        <input type="file" id="exp-file-input-sidebar" multiple hidden>

        <!-- Trash Notice -->
        <div class="trash-notice" id="trash-notice-sidebar" style="margin: 0 12px 8px; font-size: 10px; background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.15); padding: 6px 10px; border-radius: 4px; color: #ef4444;" hidden>
            <span>Tài nguyên trong Thùng rác tự động xóa sau 30 ngày.</span>
        </div>

        <!-- Breadcrumbs Navigation -->
        <div class="explorer-breadcrumbs" id="explorer-breadcrumbs-sidebar" style="margin: 0 12px 8px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.02); padding: 6px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; white-space: nowrap;">
            <!-- Dynamic breadcrumbs -->
        </div>

        <!-- Explorer list view container -->
        <div class="explorer-list-container" style="flex: 1; position: relative; overflow-y: auto; padding: 0 12px 12px;">
            <!-- Loader -->
            <div class="loader-container" id="explorer-loader-sidebar" hidden style="padding: 20px 0; text-align: center;">
                <div class="spinner spinner-sm" style="margin: 0 auto 8px;"></div>
                <p style="font-size: 11px; margin: 0; color: var(--text-muted);">Đang tải...</p>
            </div>
            
            <!-- Empty State -->
            <div class="sidebar-empty" id="explorer-empty-sidebar" hidden style="padding: 40px 0 20px; text-align: center; color: var(--text-muted);">
                <div style="margin-bottom: 8px;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <h5 id="explorer-empty-title-sidebar" style="margin: 0 0 4px; font-size: 13px; font-weight: 500;">Thư mục trống</h5>
                <p id="explorer-empty-desc-sidebar" style="margin: 0; font-size: 11px;">Chưa có tệp tin hoặc thư mục nào ở đây.</p>
            </div>

            <!-- List View Items -->
            <div class="explorer-list" id="explorer-list-sidebar" style="display: flex; flex-direction: column; gap: 4px;">
                <!-- Dynamic folder/file rows -->
            </div>
        </div>
    </div>
</aside>
</body>
</html>
