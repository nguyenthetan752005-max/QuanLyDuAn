<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký — Lily</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/base.css}">
    <link rel="stylesheet" th:href="@{/css/common/themes.css}">
    <link rel="stylesheet" th:href="@{/css/auth/auth.css}">
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body data-theme="dark">
    <div class="auth-glow auth-glow-1" aria-hidden="true"></div>
    <div class="auth-glow auth-glow-2" aria-hidden="true"></div>
    <div class="auth-container">
        <div class="auth-panel">
            <a class="auth-brand" th:href="@{/}" href="/">
                <span class="auth-brand-icon" aria-hidden="true"></span>
                <span class="auth-brand-name">Lily</span>
            </a>
            <form class="auth-form">
                <h2>Tạo tài khoản mới</h2>
                <p class="auth-description">Miễn phí, chỉ mất chưa đầy một phút.</p>
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="ban@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Đăng ký</button>

                <div class="auth-divider">
                    <span>hoặc</span>
                </div>

                <div class="auth-google-container">
                    <div id="google-signup-btn"></div>
                </div>

                <p class="auth-links">Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
                <p class="auth-links"><a th:href="@{/}">← Về trang chủ</a></p>
            </form>
        </div>
    </div>
    <script th:src="@{/js/auth/auth.js}"></script>
    <script th:inline="javascript">
        window.GOOGLE_CLIENT_ID = /*[[${googleClientId}]]*/ '';
    </script>
    <script th:src="@{/js/auth/register.js}"></script>
</body>
</html>
