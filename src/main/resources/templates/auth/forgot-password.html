<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu — Lily</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common/base.css}">
    <link rel="stylesheet" th:href="@{/css/common/themes.css}">
    <link rel="stylesheet" th:href="@{/css/auth/auth.css}">
</head>
<body data-theme="dark">
    <div class="auth-glow auth-glow-1" aria-hidden="true"></div>
    <div class="auth-glow auth-glow-2" aria-hidden="true"></div>
    <div class="auth-container">
        <div class="auth-panel">
            <a class="auth-brand" th:href="@{/}" href="/">
                <span class="auth-brand-icon" aria-hidden="true"></span>
                <span class="auth-brand-name">Lily</span>
            </a>
            <form class="auth-form">
                <h2>Quên mật khẩu</h2>
                <p class="auth-description">
                    Nhập email của bạn để nhận liên kết đặt lại mật khẩu.
                </p>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="ban@email.com" required>
                </div>
                <button type="submit" class="btn">Gửi liên kết đặt lại</button>
                <p class="auth-links">Nhớ ra mật khẩu rồi? <a th:href="@{/login}">Đăng nhập</a></p>
            </form>
        </div>
    </div>
    <script th:src="@{/js/auth/auth.js}"></script>
    <script th:src="@{/js/auth/forgot-password.js}"></script>
</body>
</html>
