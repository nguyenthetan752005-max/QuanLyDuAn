<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="app-chrome" th:fragment="topbar">
    <div class="menubar">
        <div class="menu-group">
            <button class="toolbar-button" type="button" data-menu-toggle="file-menu" data-i18n="MENU_FILE"></button>
            <div class="menu-panel" id="file-menu" hidden>
                <button class="menu-item" type="button" id="import-folder-action" data-i18n="MENU_IMPORT_FOLDER"></button>
                <button class="menu-item" type="button" id="import-file-action" data-i18n="MENU_IMPORT_FILE"></button>
                <div class="menu-separator"></div>
                <button class="menu-item" type="button" id="save-as-action" data-i18n="MENU_SAVE_AS" disabled></button>
                <div class="menu-separator"></div>
                <button class="menu-item" type="button" id="clear-workspace-action" data-i18n="MENU_CLEAR_WORKSPACE"></button>
            </div>
        </div>

        <div class="menu-group theme-entry">
            <button class="toolbar-button theme-button" type="button" data-menu-toggle="theme-menu" data-i18n-aria-label="THEME_LABEL">
                <span class="preview-thumb" aria-hidden="true"></span>
            </button>
            <div class="menu-panel" id="theme-menu" hidden>
                <button class="menu-item is-active" type="button" data-theme-option="dark" data-i18n="THEME_DARK"></button>
                <button class="menu-item" type="button" data-theme-option="light" data-i18n="THEME_LIGHT"></button>
                <button class="menu-item" type="button" data-theme-option="warm" data-i18n="THEME_WARM"></button>
                <button class="menu-item" type="button" data-theme-option="cold" data-i18n="THEME_COLD"></button>
            </div>
        </div>
    </div>
    <div class="toolbar-status" id="toolbar-status" data-i18n="STATUS_READY"></div>
</header>
</body>
</html>
