server.port=8081

spring.application.name=demo

# Import external configurations (including secrets)
spring.config.import=optional:classpath:secret.properties

# Local Storage Path
app.storage.upload-dir=uploads
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# MongoDB
spring.mongodb.uri=${MONGODB_URI}

# Local Storage Path only (ImageKit removed)

# Multipart Upload Size Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Google OAuth Configuration
google.client-id=${GOOGLE_CLIENT_ID:}

# JavaMailSender Configurations
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Custom Email Sender Display Name
app.mail.from-name=Lily Image Editor

# FFmpeg and FFprobe Executable Paths
app.ffmpeg.path=bin/ffmpeg.exe
app.ffprobe.path=bin/ffprobe.exe
